# Render Blueprint for LocalMart (single Node web service)
# Express serves the built React app from client/dist in production.
services:
  - type: web
    name: localmart
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # set in Render dashboard (MongoDB Atlas connection string)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false        # optional: leave blank for demo payment mode
      - key: RAZORPAY_KEY_SECRET
        sync: false        # optional: leave blank for demo payment mode
