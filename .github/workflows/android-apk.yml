name: Build Android APK

# Builds the Capacitor Android APK in the cloud (no local Android Studio needed)
# and publishes it to a fixed "apk-latest" release so the web app can link to it:
#   https://github.com/<OWNER>/<REPO>/releases/download/apk-latest/localmart.apk
#
# The APK is a thin native shell that loads the LIVE deployed site
# (https://localmart-7foy.onrender.com) inside a WebView, so UI/backend updates
# reflect automatically without rebuilding the APK.
#
# Setup (one time):
#   1. Push this repo to GitHub.
#   2. Actions tab -> Build Android APK -> Run workflow (or push a v* tag).
#   3. (Optional) In Render, set the client env var VITE_APK_URL to the release
#      asset URL above so the "Download App" button appears on the website.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk localmart.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: localmart-apk
          path: client/localmart.apk

      - name: Publish APK to release (apk-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: LocalMart — Android APK (latest)
          body: |
            Latest Android build of LocalMart.
            Download `localmart.apk` below and install it on your phone.
          files: client/localmart.apk
