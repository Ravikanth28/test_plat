<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>LocalMart - Your neighbourhood, delivered</title>
    <meta name="description" content="Order from local department stores, medical shops, stationery, juice and food outlets near you." />

    <!--
      Boot watchdog / self-heal. A returning visitor can be stuck on an old or
      poisoned service worker that replays a broken cached response (e.g. a
      transient 500 captured during a deploy) for the build-hashed JS/CSS. When
      that happens the bundle never executes, React never mounts, #root stays
      empty and the page is blank — and because the JS never runs, the in-app
      SW-update logic in main.jsx can never fix it (a catch-22).

      This script lives in index.html, which the server always sends fresh
      (Cache-Control: no-store), so it runs even when the hashed assets are the
      thing that's broken. It attaches a capturing error listener BEFORE any
      asset tag is parsed: if a /assets/ script or stylesheet fails to load, or
      the app simply hasn't mounted after a grace period, it purges all caches,
      unregisters every service worker, and reloads ONCE (guarded by
      sessionStorage to avoid a reload loop). The reload then loads cleanly from
      the network with no SW in the way — no manual cache-clearing needed.
    -->
    <script>
      (function () {
        var recovered = false;
        try {
          recovered = sessionStorage.getItem("lm_recovered") === "1";
        } catch (e) {}
        function recover() {
          if (recovered) return;
          recovered = true;
          try {
            sessionStorage.setItem("lm_recovered", "1");
          } catch (e) {}
          var reload = function () {
            location.reload();
          };
          var jobs = [];
          if (window.caches && caches.keys) {
            jobs.push(
              caches.keys().then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k);
                  })
                );
              })
            );
          }
          if (
            navigator.serviceWorker &&
            navigator.serviceWorker.getRegistrations
          ) {
            jobs.push(
              navigator.serviceWorker
                .getRegistrations()
                .then(function (regs) {
                  return Promise.all(
                    regs.map(function (r) {
                      return r.unregister();
                    })
                  );
                })
            );
          }
          Promise.all(jobs).then(reload, reload);
        }
        // A build-hashed asset failing to load is a hard boot failure — recover
        // immediately rather than waiting for the grace-period fallback.
        window.addEventListener(
          "error",
          function (ev) {
            var t = ev && ev.target;
            if (!t) return;
            var url = t.src || t.href || "";
            if (
              (t.tagName === "SCRIPT" || t.tagName === "LINK") &&
              url.indexOf("/assets/") !== -1
            ) {
              recover();
            }
          },
          true
        );
        // Safety net: if nothing errored but the app still isn't on screen,
        // recover. If it mounted fine, clear the guard so a FUTURE breakage can
        // heal again.
        window.addEventListener("load", function () {
          setTimeout(function () {
            var root = document.getElementById("root");
            if (root && root.childElementCount > 0) {
              try {
                sessionStorage.removeItem("lm_recovered");
              } catch (e) {}
            } else {
              recover();
            }
          }, 8000);
        });
      })();
    </script>

    <!-- Set theme before first paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("lm_theme");
          if (!t) {
            t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>

    <!-- PWA / installable app -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#e23744" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LocalMart" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Razorpay Checkout (used when live keys are configured) -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
